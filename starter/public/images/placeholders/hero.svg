<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Platshållarbild">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#2b2b2b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <!-- building silhouettes -->
  <g fill="#000" opacity="0.35">
    <rect x="180" y="430" width="220" height="470"/>
    <rect x="430" y="320" width="180" height="580"/>
    <rect x="640" y="500" width="160" height="400"/>
    <rect x="1040" y="380" width="200" height="520"/>
    <rect x="1270" y="540" width="150" height="360"/>
  </g>
  <!-- windows -->
  <g fill="#f04e30" opacity="0.5">
    <rect x="470" y="360" width="22" height="22"/><rect x="510" y="360" width="22" height="22"/>
    <rect x="470" y="410" width="22" height="22"/><rect x="510" y="410" width="22" height="22"/>
    <rect x="1080" y="430" width="22" height="22"/><rect x="1120" y="430" width="22" height="22"/>
  </g>
  <!-- drone -->
  <g transform="translate(820,250)" stroke="#f04e30" stroke-width="6" fill="none">
    <line x1="-60" y1="-30" x2="60" y2="30"/>
    <line x1="60" y1="-30" x2="-60" y2="30"/>
    <circle cx="-60" cy="-30" r="20"/><circle cx="60" cy="-30" r="20"/>
    <circle cx="-60" cy="30" r="20"/><circle cx="60" cy="30" r="20"/>
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#f04e30"/>
  </g>
  <g transform="translate(820,250)" stroke="#f04e30" stroke-width="3" opacity="0.6">
    <line x1="0" y1="14" x2="0" y2="120"/>
  </g>
  <text x="120" y="120" fill="#ffffff" font-family="Inter, sans-serif" font-size="58" font-weight="800" letter-spacing="-1">DRÖNAR<tspan fill="#f04e30">FLEX</tspan></text>
  <text x="122" y="160" fill="#9a9a9a" font-family="Inter, sans-serif" font-size="22" letter-spacing="6">PLATSHÅLLARBILD</text>
