<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-label="Smutsig fasad (före)">
  <rect width="1000" height="700" fill="#8d9285"/>
  <rect width="1000" height="700" fill="#5f6b57" opacity="0.35"/>
  <!-- algae streaks -->
  <g fill="#3f4d36" opacity="0.55">
    <rect x="90" y="0" width="40" height="700"/>
    <rect x="300" y="0" width="26" height="700"/>
    <rect x="520" y="0" width="60" height="700"/>
    <rect x="760" y="0" width="34" height="700"/>
    <rect x="880" y="0" width="48" height="700"/>
