  <rect x="24" y="39" width="54" height="8" rx="4" opacity="0.5"/>
  <rect x="40" y="53" width="28" height="11" rx="5.5"/>
  <rect x="40" y="70" width="36" height="8" rx="4" opacity="0.5"/>
</svg>
