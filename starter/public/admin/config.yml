                  - { name: quote, label: "Quote", widget: text }
                  - { name: attribution, label: "Source / name", widget: string, required: false }
                  - { name: flip, label: "Quote on left", widget: boolean, required: false, default: false }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: callout
                label: "Quote / highlighted statement"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: quote, label: "Quote / statement", widget: text }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: statPanel
                label: "Statement panel (dark, big number)"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: body, label: "Body", widget: text, required: false }
                  - name: badges
                    label: "Badges"
                    widget: list
                    required: false
                    field: { name: badge, label: "Badge", widget: string }
                  - { name: statValue, label: "Big number", widget: string, required: false }
                  - { name: statLabel, label: "Number label", widget: string, required: false }
              - name: ctaPanel
                label: "Call to action (band)"
                widget: object
                fields:
