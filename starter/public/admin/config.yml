locale: en
backend:
  name: git-gateway
  branch: main
local_backend: true
media_folder: "src/assets/uploads"
public_folder: "/src/assets/uploads"
collections:
  - name: home
    label: "Home page"
    files:
      - name: home
        label: "Home"
        file: "src/content/home/home.md"
        fields:
          - label: "SEO"
            name: seo
            widget: object
            fields:
              - { name: title, label: "SEO title", widget: string }
              - { name: description, label: "SEO description", widget: text }
          # >>> blocks:generated (run: pnpm cms:gen — do not edit between markers)
          - name: blocks
            label: "Sections · build the page (drag to reorder)"
            label_singular: "Section"
            widget: list
            required: false
            types:
              - name: hero
                label: "Hero"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: heading, label: "Heading (H1)", widget: string }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - { name: ctaLabel, label: "Button label", widget: string, required: false }
                  - name: ctaHref
                    label: "Button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "— No page —", value: "" }
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - name: media
                    label: "Right-side media"
                    widget: select
                    required: false
                    default: "none"
                    hint: "What shows beside the heading. Default: none."
                    options:
                      - { label: "None (text only)", value: "none" }
                      - { label: "Image", value: "image" }
                      - { label: "Energy flow", value: "flow" }
                      - { label: "Operations / telemetry panel", value: "ops" }
                  - { name: image, label: "Image (if “Image” chosen)", widget: image, required: false }
                  - { name: imageAlt, label: "Image alt text", widget: string, required: false }
                  - { name: flowNote, label: "Flow · chip label (if “Energy flow”)", widget: string, required: false }
                  - name: flow
                    label: "Flow · steps (if “Energy flow”)"
                    widget: list
                    required: false
                    fields:
                      - name: icon
                        label: "Icon"
                        widget: select
                        required: false
                        hint: "Optional icon."
                        options:
                          - { label: "sun", value: "sun" }
                          - { label: "panel", value: "panel" }
                          - { label: "battery", value: "battery" }
                          - { label: "home", value: "home" }
                          - { label: "roof", value: "roof" }
                          - { label: "leaf", value: "leaf" }
                          - { label: "bolt", value: "bolt" }
                          - { label: "shield", value: "shield" }
                          - { label: "wrench", value: "wrench" }
                          - { label: "headset", value: "headset" }
                          - { label: "link", value: "link" }
                          - { label: "phone", value: "phone" }
                          - { label: "mail", value: "mail" }
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: string, required: false }
                  - name: telemetry
                    label: "Ops · telemetry readouts (if “Operations”)"
                    widget: list
                    required: false
                    field: { name: item, label: "Readout", widget: string }
                  - { name: stamp, label: "Ops · corner stamp (if “Operations”)", widget: string, required: false }
                  - name: height
                    label: "Height"
                    widget: select
                    required: false
                    default: "normal"
                    hint: "Tall fills the viewport (good with a Gradient or Dark background)."
                    options:
                      - { label: "Normal", value: "normal" }
                      - { label: "Tall", value: "tall" }
                  - name: align
                    label: "Text position"
                    widget: select
                    required: false
                    default: "center"
                    hint: "Where the text sits in a Tall hero."
                    options:
                      - { label: "Top", value: "top" }
                      - { label: "Center", value: "center" }
                      - { label: "Bottom", value: "bottom" }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
                      - { label: "Dark", value: "dark" }
                      - { label: "Gradient", value: "gradient" }
              - name: cover
                label: "Cover (full-bleed)"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: heading, label: "Heading (H1)", widget: text, hint: "Press Enter for a line break." }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - { name: ctaLabel, label: "Button label", widget: string, required: false }
                  - name: ctaHref
                    label: "Button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "— No page —", value: "" }
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - { name: cta2Label, label: "Second button label", widget: string, required: false }
                  - name: cta2Href
                    label: "Second button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "— No page —", value: "" }
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - name: media
                    label: "Background"
                    widget: select
                    required: false
                    default: "image"
                    hint: "A photo, a looping video, a generated gradient, or an animated block pattern — both gradient and animated follow your brand colour, no asset needed."
                    options:
                      - { label: "Image", value: "image" }
                      - { label: "Video (looping)", value: "video" }
                      - { label: "Gradient (no image)", value: "gradient" }
                      - { label: "Animated (no image)", value: "animated" }
                  - { name: image, label: "Background image / video poster", widget: image, required: false }
                  - { name: imageAlt, label: "Image alt text", widget: string, required: false }
                  - { name: video, label: "Video file (if “Video”)", widget: file, required: false, hint: "Uploaded MP4/WebM — muted + looping. The image shows until it plays, and on reduced-motion." }
                  - { name: videoUrl, label: "…or video URL", widget: string, required: false, hint: "External MP4/WebM URL. Used instead of an uploaded file if filled." }
                  - name: overlay
                    label: "Darken (overlay)"
                    widget: select
                    required: false
                    default: "medium"
                    hint: "How much to darken the media so the text stays readable."
                    options:
                      - { label: "Light", value: "light" }
                      - { label: "Medium", value: "medium" }
                      - { label: "Strong", value: "strong" }
                  - name: align
                    label: "Text position"
                    widget: select
                    required: false
                    default: "start"
                    options:
                      - { label: "Bottom left", value: "start" }
                      - { label: "Centered", value: "center" }
                  - name: height
                    label: "Height"
                    widget: select
                    required: false
                    default: "tall"
                    options:
                      - { label: "Tall", value: "tall" }
                      - { label: "Medium", value: "medium" }
              - name: pageHeader
                label: "Page header"
                widget: object
                fields:
                  - name: variant
                    label: "Style"
                    widget: select
                    required: false
                    default: "light"
                    options:
                      - { label: "Light", value: "light" }
                      - { label: "Dark (band)", value: "dark" }
                  - name: width
                    label: "Width"
                    widget: select
                    required: false
                    default: "narrow"
                    hint: "Narrow keeps text legible; full uses the whole section width."
                    options:
                      - { label: "Narrow (reading column)", value: "narrow" }
                      - { label: "Full width", value: "full" }
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: heading, label: "Heading (H1)", widget: string }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - { name: ctaLabel, label: "Button label (optional)", widget: string, required: false }
                  - name: ctaHref
                    label: "Button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "— No page —", value: "" }
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
                      - { label: "Dark", value: "dark" }
                      - { label: "Gradient", value: "gradient" }
              - name: prose
                label: "Rich text"
                widget: object
                fields:
                  - { name: heading, label: "Heading (optional)", widget: string, required: false }
                  - { name: body, label: "Body", widget: markdown, required: false }
                  - name: width
                    label: "Width"
