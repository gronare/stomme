                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: statsBar
                label: "Stats / facts"
                widget: object
                fields:
                  - name: items
                    label: "Facts (optional — defaults to the site’s settings facts)"
                    widget: list
                    required: false
                    fields:
                      - { name: label, label: "Label", widget: string }
                      - { name: value, label: "Value", widget: string }
              - name: logoStrip
                label: "Logo / partner strip (auto)"
                widget: object
                fields:
                  - { name: _auto, label: "Auto", widget: hidden }
              - name: contactForm
                label: "Contact form (auto)"
                widget: object
                fields:
                  - { name: _auto, label: "Auto", widget: hidden }
