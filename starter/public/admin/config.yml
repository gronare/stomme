                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
                      - { label: "Dark", value: "dark" }
                      - { label: "Gradient", value: "gradient" }
              - name: textQuote
