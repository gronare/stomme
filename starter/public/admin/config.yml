locale: en
backend:
  name: git-gateway
  branch: main
local_backend: true
media_folder: "src/assets/uploads"
public_folder: "/src/assets/uploads"
collections:
  - name: home
    label: "Home page"
    files:
      - name: home
        label: "Home"
        file: "src/content/home/home.md"
        fields:
          - label: "SEO"
            name: seo
            widget: object
            fields:
              - { name: title, label: "SEO title", widget: string }
              - { name: description, label: "SEO description", widget: text }
          # >>> blocks:generated (run: pnpm cms:gen — do not edit between markers)
          - name: blocks
            label: "Sections · build the page (drag to reorder)"
            label_singular: "Section"
            widget: list
            required: false
            types:
              - name: hero
                label: "Hero"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: heading, label: "Heading (H1)", widget: string }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - { name: ctaLabel, label: "Button label", widget: string, required: false }
                  - name: ctaHref
                    label: "Button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - name: media
                    label: "Right-side media"
                    widget: select
                    required: false
                    default: "none"
                    hint: "What shows beside the heading. Default: none."
                    options:
                      - { label: "None (text only)", value: "none" }
                      - { label: "Image", value: "image" }
                      - { label: "Energy flow", value: "flow" }
                      - { label: "Operations / telemetry panel", value: "ops" }
                  - { name: image, label: "Image (if “Image” chosen)", widget: image, required: false }
                  - { name: imageAlt, label: "Image alt text", widget: string, required: false }
                  - { name: flowNote, label: "Flow · chip label (if “Energy flow”)", widget: string, required: false }
                  - name: flow
                    label: "Flow · steps (if “Energy flow”)"
                    widget: list
                    required: false
                    fields:
                      - name: icon
                        label: "Icon"
                        widget: select
                        required: false
                        hint: "Optional icon."
                        options:
                          - { label: "sun", value: "sun" }
                          - { label: "panel", value: "panel" }
                          - { label: "battery", value: "battery" }
                          - { label: "home", value: "home" }
                          - { label: "roof", value: "roof" }
                          - { label: "leaf", value: "leaf" }
                          - { label: "bolt", value: "bolt" }
                          - { label: "shield", value: "shield" }
                          - { label: "wrench", value: "wrench" }
                          - { label: "headset", value: "headset" }
                          - { label: "link", value: "link" }
                          - { label: "phone", value: "phone" }
                          - { label: "mail", value: "mail" }
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: string, required: false }
                  - name: telemetry
                    label: "Ops · telemetry chips (if “Operations”)"
                    widget: list
                    required: false
                    field: { name: item, label: "Chip", widget: string }
                  - { name: stamp, label: "Ops · corner stamp (if “Operations”)", widget: string, required: false }
              - name: pageHeader
                label: "Page header"
                widget: object
                fields:
                  - name: variant
                    label: "Style"
                    widget: select
                    required: false
                    default: "light"
                    options:
                      - { label: "Light", value: "light" }
                      - { label: "Dark (band)", value: "dark" }
                  - name: width
                    label: "Width"
                    widget: select
                    required: false
                    default: "narrow"
                    hint: "Narrow keeps text legible; full uses the whole section width."
                    options:
                      - { label: "Narrow (reading column)", value: "narrow" }
                      - { label: "Full width", value: "full" }
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
                  - { name: heading, label: "Heading (H1)", widget: string }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - { name: ctaLabel, label: "Button label (optional)", widget: string, required: false }
                  - name: ctaHref
                    label: "Button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: prose
                label: "Rich text"
                widget: object
                fields:
                  - { name: heading, label: "Heading (optional)", widget: string, required: false }
                  - { name: body, label: "Body", widget: markdown, required: false }
                  - name: width
                    label: "Width"
                    widget: select
                    required: false
                    default: "narrow"
                    hint: "Narrow keeps text legible; full uses the whole section width."
                    options:
                      - { label: "Narrow (reading column)", value: "narrow" }
                      - { label: "Full width", value: "full" }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: featureGrid
                label: "Feature cards"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false, hint: "Small uppercase label above the heading." }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - name: items
                    label: "Cards"
                    widget: list
                    required: false
                    fields:
                      - name: icon
                        label: "Icon"
                        widget: select
                        required: false
                        hint: "Optional icon."
                        options:
                          - { label: "sun", value: "sun" }
                          - { label: "panel", value: "panel" }
                          - { label: "battery", value: "battery" }
                          - { label: "home", value: "home" }
                          - { label: "roof", value: "roof" }
                          - { label: "leaf", value: "leaf" }
                          - { label: "bolt", value: "bolt" }
                          - { label: "shield", value: "shield" }
                          - { label: "wrench", value: "wrench" }
                          - { label: "headset", value: "headset" }
                          - { label: "link", value: "link" }
                          - { label: "phone", value: "phone" }
                          - { label: "mail", value: "mail" }
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: text }
                      - name: link
                        label: "Link (optional)"
                        widget: object
                        required: false
                        fields:
                          - name: page
                            label: "Page"
                            widget: select
                            required: false
                            hint: "Pick a page on the site."
                            options:
                              - { label: "Startsida (/)", value: "/" }
                              - { label: "About (/about)", value: "/about" }
                          - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                      - { name: linkLabel, label: "Link label", widget: string, required: false, hint: "E.g. \"Read more\". Shown only if the card has a link." }
                  - { name: numbered, label: "Numbered (01/02/03 instead of icons)", widget: boolean, required: false, default: false }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: pillars
                label: "Principles / values"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false, hint: "Small uppercase label above the heading." }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - name: items
                    label: "Cards"
                    widget: list
                    required: false
                    fields:
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: text }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: specialistGrid
                label: "Specialist grid"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false, hint: "Small uppercase label above the heading." }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - name: items
                    label: "Cards"
                    widget: list
                    required: false
                    fields:
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: text }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: steps
                label: "Process / steps"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false, hint: "Small uppercase label above the heading." }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - name: items
                    label: "Cards"
                    widget: list
                    required: false
                    fields:
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: text }
                  - name: width
                    label: "Width"
                    widget: select
                    required: false
                    default: "narrow"
                    hint: "Narrow keeps text legible; full uses the whole section width."
                    options:
                      - { label: "Narrow (reading column)", value: "narrow" }
                      - { label: "Full width", value: "full" }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: checklist
                label: "Checklist (ticked items)"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false, hint: "Small uppercase label above the heading." }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - name: items
                    label: "Items"
                    widget: list
                    required: false
                    fields:
                      - { name: text, label: "Text", widget: string }
                      - { name: note, label: "Sub-line (optional)", widget: text, required: false }
                  - { name: columns, label: "Columns", widget: number, required: false, default: 2, hint: "1 or 2." }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: gallery
