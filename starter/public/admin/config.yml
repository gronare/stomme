output:
  omit_empty_optional_fields: true
# >>> cms:generated (run: pnpm cms:gen — do not edit between markers)
backend:
  name: git-gateway
  branch: main
# <<< cms:generated
media_folder: "src/assets/uploads"
public_folder: "/src/assets/uploads"
collections:
