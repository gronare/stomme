                          - { label: "battery", value: "battery" }
                          - { label: "home", value: "home" }
                          - { label: "roof", value: "roof" }
                          - { label: "leaf", value: "leaf" }
                          - { label: "bolt", value: "bolt" }
                          - { label: "shield", value: "shield" }
                          - { label: "wrench", value: "wrench" }
                          - { label: "headset", value: "headset" }
                          - { label: "link", value: "link" }
                          - { label: "phone", value: "phone" }
                          - { label: "mail", value: "mail" }
                      - { name: title, label: "Title", widget: string }
                      - { name: body, label: "Text", widget: text }
                      - name: link
                        label: "Link (optional)"
                        widget: object
                        required: false
                        fields:
                          - name: page
                            label: "Page"
                            widget: select
                            required: false
                            hint: "Pick a page on the site."
                            options:
                              - { label: "— No page —", value: "" }
                              - { label: "Startsida (/)", value: "/" }
                              - { label: "About (/about)", value: "/about" }
                          - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                      - { name: linkLabel, label: "Link label", widget: string, required: false, hint: "E.g. \"Read more\". Shown only if the card has a link." }
                  - { name: numbered, label: "Numbered (01/02/03 instead of icons)", widget: boolean, required: false, default: false }
                  - name: surface
