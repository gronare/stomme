                  - name: ctaHref
                    label: "Button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
                        hint: "Pick a page on the site."
                        options:
                          - { label: "— No page —", value: "" }
                          - { label: "Home (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                          - { label: "Contact (/contact)", value: "/contact" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - { name: cta2Label, label: "Second button label", widget: string, required: false, hint: "Shown as a quiet text link beside the button." }
                  - name: cta2Href
                    label: "Second button link"
                    widget: object
                    required: false
                    fields:
                      - name: page
                        label: "Page"
                        widget: select
                        required: false
