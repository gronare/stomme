                        options:
                          - { label: "Startsida (/)", value: "/" }
                          - { label: "About (/about)", value: "/about" }
                      - { name: url, label: "…or a custom URL", widget: string, required: false, hint: "External link, tel: or mailto:. Used if filled." }
                  - name: surface
