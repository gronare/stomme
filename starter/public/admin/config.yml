                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: beforeAfter
                label: "Before / after"
                widget: object
                fields:
                  - { name: eyebrow, label: "Eyebrow", widget: string, required: false, hint: "Small uppercase label above the heading." }
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: intro, label: "Intro", widget: text, required: false }
                  - { name: before, label: "Before image", widget: image, required: false }
                  - { name: after, label: "After image", widget: image, required: false }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
                    options:
                      - { label: "Standard (white)", value: "standard" }
                      - { label: "Tinted", value: "tint" }
                      - { label: "Accent band", value: "band" }
              - name: textImage
                label: "Text + image"
                widget: object
                fields:
                  - { name: heading, label: "Heading", widget: string, required: false }
                  - { name: body, label: "Text", widget: markdown }
                  - { name: image, label: "Image", widget: image, required: false }
                  - { name: imageAlt, label: "Alt text", widget: string, required: false }
                  - { name: flip, label: "Image on left", widget: boolean, required: false, default: false }
                  - name: surface
                    label: "Background"
                    widget: select
                    required: false
                    default: "standard"
                    hint: "The surface behind the section — for rhythm between blocks."
