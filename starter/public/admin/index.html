<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager</title>
    <!-- stomme-gen injects the same-window auth handoff shim here (before the Decap bundle). -->
      <!-- >>> stomme-auth:generated (managed by stomme-gen — do not edit) -->
    <script>
      (function () {
        try {
          var m = (location.hash || '').match(/stomme_cms_token=([^&]+)/);
          if (!m) return;
          var token = decodeURIComponent(m[1]);
          if (!token) return;
          var email = '';
          try {
            var b = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            b += '==='.slice((b.length + 3) % 4);
            email = (JSON.parse(atob(b)) || {}).email || '';
          } catch (e) {}
          localStorage.setItem('sveltia-cms.user', JSON.stringify({ name: email, login: email, email: email, token: token, backendName: 'github' }));
          history.replaceState(null, '', location.pathname + location.search);
          location.reload();
        } catch (e) {}
      })();
    </script>
