# Fleet upgrade check (steg 2) — anropas från sajtrepon (weekly cron + manuellt
# från the control plane). Baseline-lös A/B i SAMMA runner: bygg sajtens lookbook med
# den pinnade motor-SHA:n och med senaste release, rendera till sidbilder och
# hash-jämför. Identiskt ⇒ pinnen bumpas automatiskt (redaktörsbyggen får nya
# motorn nästa publicering). Diff ⇒ artefakter (sida-vid-sida) + röd körning som
# väntar på operatörsgodkännande. Resultatet rapporteras till the control plane (HMAC).
name: Upgrade check

on:
  workflow_call:
    secrets:
      the control plane_hook_secret:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout engine (full history)
        uses: actions/checkout@v4
        with:
          repository: gronare/stomme
          fetch-depth: 0
          path: stomme

      - name: Read pin & release
        id: pin
        run: |
          DY=site/.github/workflows/deploy.yml
          # Pinnen bor i .stomme-engine; äldre sajter har den kvar i deploy.yml.
          if [ -f site/.stomme-engine ]; then
            PIN=$(awk '{print $1; exit}' site/.stomme-engine)
          else
            PIN=$(grep -oE 'ref: *([0-9a-f]{7,40}|release)' "$DY" | head -1 | awk '{print $2}')
          fi
          RELEASE=$(git -C stomme rev-parse origin/release)
          echo "pin=$PIN" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          if grep -qs 'pinned at handover' "$DY" site/.stomme-engine; then
            echo "status=follows_release" >> "$GITHUB_OUTPUT"   # handover — rörs aldrig
          elif [ "$PIN" = "release" ]; then
            echo "status=follows_release" >> "$GITHUB_OUTPUT"
          elif [ "$RELEASE" = "$PIN" ] || case "$RELEASE" in "$PIN"*) true;; *) false;; esac; then
            echo "status=up_to_date" >> "$GITHUB_OUTPUT"
          else
            echo "status=check" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.pin.outputs.status == 'check'
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        if: steps.pin.outputs.status == 'check'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install render deps
        if: steps.pin.outputs.status == 'check'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install site deps
        if: steps.pin.outputs.status == 'check'
        working-directory: site
        run: pnpm install --frozen-lockfile

      # Bygg + rendera lookbook två gånger i samma miljö — determinismen kommer
      # av att A och B delar runner, fonter och Chrome-version.
      - name: Render A (pinnad motor) och B (senaste release)
        if: steps.pin.outputs.status == 'check'
        id: render
        run: |
          set -e
          # Bygg med samma target som sajtens deploy kör — vi gatar det som shippas.
          BUILD_CMD=$(grep -oE 'pnpm run build:[a-z]+' site/.github/workflows/deploy.yml | head -1)
          BUILD_CMD=${BUILD_CMD:-pnpm build}
          render() {  # $1 = engine-sha, $2 = utkatalog
            git -C stomme checkout -q "$1"
            (cd stomme && pnpm install --frozen-lockfile --silent)
            rm -rf site/dist
            (cd site && STOMME_LOOKBOOK=1 $BUILD_CMD > /dev/null)
            test -f site/dist/lookbook/index.html || { echo "ingen dist/lookbook"; exit 1; }
            mkdir -p "$2"
            pkill -f "http.server 4437" 2> /dev/null || true
            python3 -m http.server 4437 --directory site/dist > /dev/null 2>&1 &
            SRV=$!
            sleep 1
            google-chrome --headless=new --disable-gpu --no-pdf-header-footer \
              --print-to-pdf="$2/lookbook.pdf" --virtual-time-budget=8000 \
              "http://localhost:4437/lookbook/" 2> /dev/null
            kill "$SRV" 2> /dev/null || true
            pdftoppm -png -r 72 "$2/lookbook.pdf" "$2/page"
          }
          render "${{ steps.pin.outputs.pin }}" /tmp/a
          render "${{ steps.pin.outputs.release }}" /tmp/b
          diffpages=""
          for a in /tmp/a/page*.png; do
            b="/tmp/b/$(basename "$a")"
            if [ ! -f "$b" ] || ! cmp -s "$a" "$b"; then diffpages="$diffpages $(basename "$a")"; fi
          done
          for b in /tmp/b/page*.png; do
            [ -f "/tmp/a/$(basename "$b")" ] || diffpages="$diffpages $(basename "$b")"
          done
          echo "diffpages=${diffpages# }" >> "$GITHUB_OUTPUT"

      - name: Bump pin (identisk rendering)
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages == ''
        id: bump
        working-directory: site
        run: |
          PIN="${{ steps.pin.outputs.pin }}"
          RELEASE="${{ steps.pin.outputs.release }}"
          echo "$RELEASE # frozen $(date +%F) — upgrade-check" > .stomme-engine
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .stomme-engine
          git commit -m "upgrade-check: bump engine $PIN -> ${RELEASE:0:10} (grön A/B)"
          git push

      - name: Collect diff artifacts
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages != ''
        run: |
          mkdir -p /tmp/diff
          for p in ${{ steps.render.outputs.diffpages }}; do
            [ -f "/tmp/a/$p" ] && cp "/tmp/a/$p" "/tmp/diff/${p%.png}-pinned.png"
            [ -f "/tmp/b/$p" ] && cp "/tmp/b/$p" "/tmp/diff/${p%.png}-release.png"
          done

      - name: Upload diff artifacts
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages != ''
        uses: actions/upload-artifact@v4
        with:
          name: lookbook-diff
          path: /tmp/diff

      - name: Report to the control plane
        if: always()
        env:
          SECRET: ${{ secrets.the control plane_hook_secret }}
        run: |
          [ -z "$SECRET" ] && { echo "ingen hook-secret — hoppar rapportering"; exit 0; }
          STATUS="${{ steps.pin.outputs.status }}"
          if [ "$STATUS" = "check" ]; then
            if [ "${{ job.status }}" != "success" ] && [ -z "${{ steps.render.outputs.diffpages }}" ]; then STATUS="error"
            elif [ -n "${{ steps.render.outputs.diffpages }}" ]; then STATUS="diff"
            else STATUS="upgraded"; fi
          fi
          BODY=$(jq -nc --arg repo "$GITHUB_REPOSITORY" --arg status "$STATUS" \
            --arg from "${{ steps.pin.outputs.pin }}" --arg to "${{ steps.pin.outputs.release }}" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{repo:$repo,status:$status,from:$from,to:$to,run_url:$run_url}')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')
          curl -sf -X POST -H "Content-Type: application/json" \
            -H "X-the control plane-Signature: $SIG" -d "$BODY" \
            https://the control plane.gronare.se/hooks/upgrade_check || echo "rapportering misslyckades (icke-blockerande)"

      - name: Fail on diff (väntar på godkännande)
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages != ''
        run: |
          echo "::error::Visuell diff mellan pinnad motor och release — granska artefakten lookbook-diff. Godkänn genom att bumpa pinnen manuellt (the control plane/stomme-freeze) eller invänta nästa release."
          exit 1
