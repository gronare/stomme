# Fleet upgrade check — reusable workflow called from site repos (weekly cron +
# manual dispatch). Baseline-less A/B in the SAME runner: build the site's
# lookbook with the pinned engine SHA and with the latest release, render both
# to page images and hash-compare. This workflow only REPORTS the outcome to the
# control plane (which owns the pin under the "abolish followers" model and adopts
# the release SHA on a green report). Different ⇒ side-by-side artifacts +
# a red run awaiting operator approval.
#
# Freeze-on-diff: a site that follows `release` (no SHA pin) is normally a no-op
# here, but if the caller passes an explicit A/B range (ab_from/ab_to) the two
# release SHAs are compared for this site's lookbook — identical keeps it
# following, a diff turns the run red so the control plane can pin it at ab_from.
# The result is reported to an optional control-plane webhook (HMAC-signed; URL
# and secret are provided by the caller — nothing operator-specific lives here).
name: Upgrade check

on:
  workflow_call:
    inputs:
      # Optional private themes checkout, so A and B build exactly like the site's
      # deploy does. The repo name is supplied by the CALLER — nothing
      # operator-specific lives in this file.
      themes_repo:
        type: string
        required: false
        default: ""
      # Optional explicit A/B range for freeze-on-diff. When BOTH are set and the
      # site follows release (pin = "release"), the control plane is asking this
      # follows-release site to A/B two release SHAs (ab_from -> ab_to) instead of
      # short-circuiting — identical keeps it following, a diff lets the control
      # plane pin it. Empty (the default) preserves today's behaviour exactly.
      ab_from:
        type: string
        required: false
        default: ""
      ab_to:
        type: string
        required: false
        default: ""
    secrets:
      repos_token:
        required: false
      report_url:
        required: false
      report_secret:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout engine (full history)
        uses: actions/checkout@v4
        with:
          repository: gronare/stomme
          fetch-depth: 0
          path: stomme

      # continue-on-error mirrors the deploy: a themeless site must never be
      # blocked by a failed optional checkout — and a site that NEEDS the theme
      # then fails the same way its deploy would (the engine throws when a
      # style is set without STOMME_THEMES_DIR).
      - name: Checkout themes (optional)
        if: inputs.themes_repo != ''
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.themes_repo }}
          token: ${{ secrets.repos_token }}
          path: stomme-themes

      - name: Read pin & release
        id: pin
        run: |
          DY=site/.github/workflows/deploy.yml
          # The pin lives in .stomme-engine; legacy sites may still have it in deploy.yml.
          if [ -f site/.stomme-engine ]; then
            PIN=$(awk '{print $1; exit}' site/.stomme-engine)
          else
            PIN=$(grep -oE 'ref: *([0-9a-f]{7,40}|release)' "$DY" | head -1 | awk '{print $2}')
          fi
          RELEASE=$(git -C stomme rev-parse origin/release)
          AB_FROM="${{ inputs.ab_from }}"
          AB_TO="${{ inputs.ab_to }}"
          # A and B are the two engine SHAs to render. Normally A = the site's pin
          # and B = the current release. In freeze-on-diff A/B mode (below) they are
          # the explicit ab_from -> ab_to range the control plane passed instead.
          A="$PIN"
          B="$RELEASE"
          if grep -qs 'pinned at handover' "$DY" site/.stomme-engine; then
            STATUS=follows_release   # handover pins are never touched
          elif [ "$PIN" = "release" ] && [ -n "$AB_FROM" ] && [ -n "$AB_TO" ]; then
            # Freeze-on-diff: A/B the two release SHAs for this follows-release
            # site. Identical ⇒ keep following (up_to_date); diff ⇒ the control
            # plane pins the site at ab_from. No local pin to bump in this mode.
            STATUS=check
            A="$AB_FROM"
            B="$AB_TO"
            echo "ab_mode=1" >> "$GITHUB_OUTPUT"
          elif [ "$PIN" = "release" ]; then
            STATUS=follows_release
          elif [ "$RELEASE" = "$PIN" ] || case "$RELEASE" in "$PIN"*) true;; *) false;; esac; then
            STATUS=up_to_date
          else
            STATUS=check
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "pin=$A" >> "$GITHUB_OUTPUT"
          echo "release=$B" >> "$GITHUB_OUTPUT"

      # Tell the control plane the run has started, so it can show live run-state
      # while the A/B render runs. Only when there's real work to do — an
      # up_to_date/follows_release short-circuit never reports "started". Same
      # HMAC-signed, non-blocking pattern as the report step below; skips silently
      # when no webhook url/secret is supplied.
      - name: Report start
        if: steps.pin.outputs.status == 'check'
        env:
          REPORT_URL: ${{ secrets.report_url }}
          SECRET: ${{ secrets.report_secret }}
        run: |
          [ -z "$SECRET" ] || [ -z "$REPORT_URL" ] && { echo "no report url/secret - skipping report"; exit 0; }
          BODY=$(jq -nc --arg repo "$GITHUB_REPOSITORY" --arg status "started" \
            --arg from "${{ steps.pin.outputs.pin }}" --arg to "${{ steps.pin.outputs.release }}" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{repo:$repo,status:$status,from:$from,to:$to,run_url:$run_url}')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')
          curl -sf -X POST -H "Content-Type: application/json" \
            -H "X-Stomme-Signature: $SIG" -d "$BODY" \
            "$REPORT_URL" || echo "report failed (non-blocking)"

      - name: Setup pnpm
        if: steps.pin.outputs.status == 'check'
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        if: steps.pin.outputs.status == 'check'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install render deps
        if: steps.pin.outputs.status == 'check'
        # imagemagick (compare/identify) backs the pixel-tolerant comparison in
        # same_png(); preinstalled on ubuntu-latest, but pinned here so a runner-
        # image change can't silently drop it (same_png would then go byte-strict).
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils imagemagick

      - name: Install site deps
        if: steps.pin.outputs.status == 'check'
        working-directory: site
        run: pnpm install --frozen-lockfile

      # Build + render the lookbook twice in one environment — determinism comes
      # from A and B sharing the runner, fonts and Chrome version.
      - name: Render A (pinned engine) and B (latest release)
        if: steps.pin.outputs.status == 'check'
        id: render
        run: |
          set -e
          # Build with the same target the site's deploy uses — gate what ships.
          BUILD_CMD=$(grep -oE 'pnpm run build:[a-z]+' site/.github/workflows/deploy.yml | head -1)
          BUILD_CMD=${BUILD_CMD:-pnpm build}
          # Same theme env as the deploy — set only when the checkout landed, so
          # both A and B render with the site's real theme in place.
          if [ -d stomme-themes/themes ]; then export STOMME_THEMES_DIR="$PWD/stomme-themes/themes"; fi
          render() {  # $1 = engine sha, $2 = output dir
            # A missing/orphaned engine SHA (removed from history by a rewrite) fails
            # checkout in this refs-only clone. Record it as a STRUCTURED reason so the
            # control plane self-heals deterministically instead of guessing reachability
            # (the commits API returns 200 for dangling commits and gets it wrong).
            # -f + clean: a build can dirty the engine checkout (older engines regenerate
            # manifest files in-tree), and a dirty tree fails the SECOND checkout.
            if ! git -C stomme checkout -qf "$1" 2> /dev/null; then
              echo "engine_checkout_failed=$1" >> "$GITHUB_OUTPUT"
              echo "::error::engine checkout failed: $1 not in history (orphaned/rewritten)"
              exit 1
            fi
            git -C stomme clean -fdq -- packages/stomme
            (cd stomme && pnpm install --frozen-lockfile --silent)
            rm -rf site/dist
            (cd site && STOMME_LOOKBOOK=1 $BUILD_CMD > /dev/null)
            test -f site/dist/lookbook/index.html || { echo "no dist/lookbook"; exit 1; }
            mkdir -p "$2"
            pkill -f "http.server 4437" 2> /dev/null || true
            python3 -m http.server 4437 --directory site/dist > /dev/null 2>&1 &
            SRV=$!
            sleep 1
            # Whole book (page-NN) — always captured: it is the comparison unit against
            # an engine that predates the per-section lookbook, so the transition release
            # itself doesn't flag every site (block-* would exist on one side only).
            google-chrome --headless=new --disable-gpu --no-pdf-header-footer \
              --print-to-pdf="$2/lookbook.pdf" --virtual-time-budget=8000 \
              "http://localhost:4437/lookbook/" 2> /dev/null
            pdftoppm -png -r 72 "$2/lookbook.pdf" "$2/page"
            # Per-section pages (block-<slug>) — each lookbook section on its own page,
            # so a height change in one block can't shift the captures of the others
            # (the whole-book PDF cascades one change into "every page after it differs").
            for f in site/dist/lookbook/*/index.html; do
              [ -f "$f" ] || continue
              slug=$(basename "$(dirname "$f")")
              google-chrome --headless=new --disable-gpu --no-pdf-header-footer \
                --print-to-pdf="$2/$slug.pdf" --virtual-time-budget=8000 \
                "http://localhost:4437/lookbook/$slug/" 2> /dev/null
              pdftoppm -png -r 72 "$2/$slug.pdf" "$2/block-$slug"
              rm -f "$2/$slug.pdf"
            done
            kill "$SRV" 2> /dev/null || true
          }
          render "${{ steps.pin.outputs.pin }}" /tmp/a
          render "${{ steps.pin.outputs.release }}" /tmp/b
          # Diff per block when BOTH engines emitted per-section pages; otherwise fall
          # back to the whole-book pages (legacy engine on at least one side).
          if compgen -G "/tmp/a/block-*.png" > /dev/null && compgen -G "/tmp/b/block-*.png" > /dev/null; then
            PAT="block-*.png"
          else
            PAT="page-*.png"
          fi
          # Visual-equality gate (replaces byte-exact cmp): byte-identical is same
          # (fast path); otherwise count "really different" pixels with ImageMagick
          # `compare -metric AE -fuzz 2%`. Rationale: PNG re-encoding and sub-pixel
          # antialiasing jitter can make visually identical renders byte-differ
          # (false-positive diffs — one fleet page); a real change (text, color,
          # layout) flips thousands of pixels. SAME iff AE <= pixels/400 — 0.25%. (Was
          # pixels/2000 = 0.05%; raised after a decorative fine-stroke icon jittered ~700 px
          # between builds even post-blur, entirely on the icon, with no perceivable change —
          # 0.25% is orders of magnitude below any real engine-upgrade regression.) ERRORS
          # stay strict: dimension mismatch, any compare error, or missing ImageMagick all
          # count as DIFFERENT (byte-strict, as before).
          same_png() {  # $1 = A png, $2 = B png; exit 0 = visually same
            cmp -s "$1" "$2" && return 0
            command -v compare > /dev/null && command -v identify > /dev/null && command -v convert > /dev/null || return 1
            local wh w h px ae ba bb budget
            wh=$(identify -format '%wx%h' "$1" 2> /dev/null) || return 1
            w=${wh%%x*}; h=${wh##*x}
            case "$w$h" in (''|*[!0-9]*) return 1 ;; esac
            px=$(( w * h ))
            # Antialiasing / sub-pixel tolerance. -fuzz 2% forgives per-pixel COLOUR
            # deltas but nothing spatial: a 1px layout jitter re-rasterises soft edges
            # (radial gradients, 48px shadows, dashed dividers, glyphs) and flips
            # thousands of hard-edge pixels — a false diff, seen repeatedly on the
            # facts card. Blur BOTH by ~1px first so a sub-pixel edge shift falls under
            # the fuzz, while a real change (new text, a moved element, a colour swap)
            # still moves whole regions and trips the px/400 budget. Blur failure ⇒
            # treat as DIFFERENT (conservative), like any other compare error.
            ba=$(mktemp --suffix=.png) && bb=$(mktemp --suffix=.png) || return 1
            convert "$1" -blur 0x0.8 "$ba" 2> /dev/null && convert "$2" -blur 0x0.8 "$bb" 2> /dev/null || { rm -f "$ba" "$bb"; return 1; }
            ae=$(compare -metric AE -fuzz 2% "$ba" "$bb" null: 2>&1) || true
            rm -f "$ba" "$bb"
            case "$ae" in (''|*[!0-9.eE+-]*) return 1 ;; esac
            ae=$(awk -v v="$ae" 'BEGIN { printf "%d", v + 0 }')  # 1.2e+03 -> 1200
            budget=$(( px / 400 ))
            [ "$ae" -le "$budget" ] && return 0
            echo "  diff $(basename "$1"): AE=$ae > budget=$budget (post-blur)" >&2  # why a page flagged
            return 1
          }
          diffpages=""
          for a in /tmp/a/$PAT; do
            [ -f "$a" ] || continue
            b="/tmp/b/$(basename "$a")"
            if [ ! -f "$b" ] || ! same_png "$a" "$b"; then diffpages="$diffpages $(basename "$a")"; fi
          done
          for b in /tmp/b/$PAT; do
            [ -f "$b" ] || continue
            [ -f "/tmp/a/$(basename "$b")" ] || diffpages="$diffpages $(basename "$b")"
          done
          echo "diffpages=${diffpages# }" >> "$GITHUB_OUTPUT"

      # NB: the workflow no longer writes .stomme-engine on a green A/B. Under the
      # control plane's "abolish followers" model the pin is owned SOLELY by the control
      # plane (it pins the exact release SHA + deploys on the follows_release/up_to_date
      # report). A workflow-side `echo release > .stomme-engine` would reintroduce an
      # ungated follower and race the control plane's Contents-API write — so green just
      # REPORTS (the report step below sets status=follows_release for an identical render).

      - name: Collect diff artifacts
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages != ''
        run: |
          mkdir -p /tmp/diff
          for p in ${{ steps.render.outputs.diffpages }}; do
            [ -f "/tmp/a/$p" ] && cp "/tmp/a/$p" "/tmp/diff/${p%.png}-pinned.png"
            [ -f "/tmp/b/$p" ] && cp "/tmp/b/$p" "/tmp/diff/${p%.png}-release.png"
          done

      - name: Upload diff artifacts
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages != ''
        uses: actions/upload-artifact@v4
        with:
          name: lookbook-diff
          path: /tmp/diff

      - name: Report to control plane
        if: always()
        env:
          REPORT_URL: ${{ secrets.report_url }}
          SECRET: ${{ secrets.report_secret }}
        run: |
          [ -z "$SECRET" ] || [ -z "$REPORT_URL" ] && { echo "no report url/secret - skipping report"; exit 0; }
          STATUS="${{ steps.pin.outputs.status }}"
          MISSING="${{ steps.render.outputs.engine_checkout_failed }}"
          REASON=""
          if [ "$STATUS" = "check" ]; then
            if [ -n "$MISSING" ]; then STATUS="error"; REASON="engine_checkout_failed"  # orphaned SHA → deterministic self-heal
            elif [ "${{ job.status }}" != "success" ] && [ -z "${{ steps.render.outputs.diffpages }}" ]; then STATUS="error"
            elif [ -n "${{ steps.render.outputs.diffpages }}" ]; then STATUS="diff"
            elif [ "${{ steps.pin.outputs.ab_mode }}" = "1" ]; then STATUS="up_to_date"  # follows-release, identical release SHAs ⇒ keep following
            else STATUS="follows_release"; fi  # pinned site, green A/B ⇒ unfreeze, follow release again
          fi
          BODY=$(jq -nc --arg repo "$GITHUB_REPOSITORY" --arg status "$STATUS" \
            --arg from "${{ steps.pin.outputs.pin }}" --arg to "${{ steps.pin.outputs.release }}" \
            --arg reason "$REASON" --arg missing "$MISSING" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{repo:$repo,status:$status,from:$from,to:$to,run_url:$run_url} + (if $reason != "" then {reason:$reason,missing:$missing} else {} end)')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')
          curl -sf -X POST -H "Content-Type: application/json" \
            -H "X-Stomme-Signature: $SIG" -d "$BODY" \
            "$REPORT_URL" || echo "report failed (non-blocking)"

      - name: Fail on diff (awaiting approval)
        if: steps.pin.outputs.status == 'check' && steps.render.outputs.diffpages != ''
        run: |
          echo "::error::Visual diff between pinned engine and release - review the lookbook-diff artifact. Approve by bumping the pin manually, or wait for the next release."
          exit 1
