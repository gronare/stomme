name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Build + typecheck the starter. This is the regression
  # net: a broken block, a type error, or a failing image/Astro build shows up here.
  sites:
    name: build + check (${{ matrix.site }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - starter
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads packageManager from package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: astro check (types)
        working-directory: ${{ matrix.site }}
        run: pnpm exec astro check
      - name: build (cms:gen + astro build)
        working-directory: ${{ matrix.site }}
        run: pnpm run build

  # Production-runtime guard: build the starter with the Cloudflare adapter and
  # serve dist/ on workerd (wrangler pages dev — no deploy), then assert /preview
  # actually renders. Catches the class of bug that is invisible on the Node dev
  # server, e.g. decoding ?data= with Node's Buffer (absent on workerd → an empty
  # #preview-root on every deployed site). Core HTTP checks only — no browser; the
  # optional CSP detector needs Playwright and is run locally (see the script header).
  preview-workerd:
    name: preview smoke (workerd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The script builds:cloudflare + serves dist/ on workerd + asserts /preview.
      - name: smoke /preview on workerd
        run: pnpm --filter @gronare/stomme test:preview-workerd -- --no-csp

  # NB: the Sveltia DOM contract test (test:admin-contract) is deliberately NOT a
  # per-PR job — between version bumps the pinned Sveltia (and its DOM) doesn't
  # change, so it would be redundant every run. It runs in sveltia.yml instead:
  # nightly against the latest release, and on every apply (bump) before commit.

  # Catch syntax errors in the engine's plain-JS scripts (bins, integration,
  # the Decap previews module) — none of these go through astro check.
  engine-scripts:
    name: engine scripts syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: node --check
        run: |
          node --check packages/stomme/bin/gen-admin-blocks.mjs
          node --check packages/stomme/bin/new-block.mjs
          node --check packages/stomme/integration.mjs
          node --check packages/stomme/admin/previews.js
          node --check packages/stomme/test/smoke-preview-workerd.mjs

  # The control plane fetches schema-manifest.json + blocks-manifest.json raw at
  # release refs and diffs site content against them — a committed manifest that
  # lags its generator source (collections.ts / catalog.ts) reports wrong drift.
  # Regenerate both and fail on any diff, so every ref the fleet can pin to
  # carries manifests that match the code at that ref.
  manifests-fresh:
    name: manifests fresh (schema + blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate manifests
        run: |
          pnpm --filter @gronare/stomme gen:schema-manifest
          pnpm --filter @gronare/stomme gen:blocks-manifest
      - name: committed manifests match their generators
        run: git diff --exit-code -- packages/stomme/schema-manifest.json packages/stomme/blocks-manifest.json
