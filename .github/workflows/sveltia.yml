# Sveltia version check / bump — nightly + on-demand from the control plane (no PRs).
#
#   nightly (schedule) → mode=check against the latest npm release.
#   mode=check  → run the admin DOM contract test against a target Sveltia version
#                 (STOMME_SVELTIA_SRC dry-run) WITHOUT changing anything. Green =
#                 that version is safe to adopt.
#   mode=apply  → bump the pin (SVELTIA_CMS_SRC in gen-admin-blocks.mjs) to the
#                 target, regenerate + build + contract, and COMMIT to main only if
#                 everything is green (never a broken main; operator then promotes
#                 main→release). No PR.
#
# This is the ONLY place the contract runs — it is not part of per-PR CI, because
# between bumps the pinned Sveltia (and thus the DOM) does not change. Both modes
# report the outcome to the control plane over the same HMAC webhook as
# upgrade-check.yml (report_url/report_secret secrets; skips if unset), so its
# page can show status + notify without anyone touching GitHub.
name: Sveltia

on:
  schedule:
    - cron: "17 3 * * *" # nightly — check the latest release against the contract
  workflow_dispatch:
    inputs:
      mode:
        description: check (dry-run contract) or apply (bump + commit to main)
        type: choice
        options: [check, apply]
        default: check
      version:
        description: target version, or "latest"
        type: string
        default: latest

concurrency: sveltia-${{ github.ref }}

jobs:
  sveltia:
    runs-on: ubuntu-latest
    permissions:
      contents: write # apply commits the bump to main
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Resolve mode + versions
        id: v
        env: # read inputs via env, never interpolated raw into shell/sed below
          IN_MODE: ${{ inputs.mode }}
          IN_VERSION: ${{ inputs.version }}
        run: |
          GEN=packages/stomme/bin/gen-admin-blocks.mjs
          MODE="${IN_MODE:-check}" # empty on schedule → check
          CURRENT=$(grep -oE '@sveltia/cms@[0-9]+\.[0-9]+\.[0-9]+' "$GEN" | head -1 | sed 's/.*@//')
          TARGET="${IN_VERSION:-latest}"
          if [ "$TARGET" = latest ]; then TARGET=$(npm view @sveltia/cms version); fi
          # TARGET flows into sed + a URL below → hard-gate the shape before anything uses it.
          if ! [[ "$TARGET" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then echo "invalid target version: $TARGET" >&2; exit 1; fi
          if [ "$MODE" != check ] && [ "$MODE" != apply ]; then echo "invalid mode: $MODE" >&2; exit 1; fi
          echo "mode=$MODE"       >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"   >> "$GITHUB_OUTPUT"
          echo "src=https://unpkg.com/@sveltia/cms@$TARGET/dist/sveltia-cms.js" >> "$GITHUB_OUTPUT"
          echo "Sveltia: mode=$MODE current=$CURRENT target=$TARGET"

      # apply: bump the pin FIRST so the build/contract exercise the new version.
      - name: Bump pin (apply)
        if: steps.v.outputs.mode == 'apply'
        run: |
          GEN=packages/stomme/bin/gen-admin-blocks.mjs
          sed -i -E "s#@sveltia/cms@[0-9]+\.[0-9]+\.[0-9]+#@sveltia/cms@${{ steps.v.outputs.target }}#g" "$GEN"

      # Guard the target the way a deploy would: types + build + the DOM contract.
      # apply reads the (now-bumped) pin; check overrides via STOMME_SVELTIA_SRC.
      - name: Verify (build + contract)
        id: verify
        env:
          STOMME_SVELTIA_SRC: ${{ steps.v.outputs.mode == 'check' && steps.v.outputs.src || '' }}
        run: |
          set -e
          if [ "${{ steps.v.outputs.mode }}" = apply ]; then
            (cd starter && pnpm exec astro check)
            (cd starter && pnpm run build) > /dev/null
          fi
          pnpm --filter @gronare/stomme test:admin-contract

      # apply + green: regenerate the tracked starter admin so it matches the new
      # pin, then commit both to main. Consuming sites pick up the new engine on
      # their next publish; the operator promotes main→release from the control plane.
      - name: Commit bump (apply, green)
        id: commit
        # Explicit if:s drop the implicit success() gate — require a green verify so a
        # red-contract (or failed build) apply can never commit a broken bump to main.
        if: steps.v.outputs.mode == 'apply' && steps.verify.outcome == 'success'
        run: |
          (cd starter && pnpm run cms:gen)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/stomme/bin/gen-admin-blocks.mjs starter/public/admin
          # Nothing staged ⇒ the pin was already at target. Report that distinctly
          # (already=true) so the control plane doesn't confuse it with a real commit/push
          # failure (a rejected push must NOT read as "already at target"). applied stays
          # false; only a real commit+push sets applied=true (a push failure exits non-zero
          # before that line, leaving applied unset → false).
          if git diff --cached --quiet; then
            echo "already=true"  >> "$GITHUB_OUTPUT"
            echo "applied=false" >> "$GITHUB_OUTPUT"
            echo "nothing to commit — pin already at target"
            exit 0
          fi
          git commit -m "cms: bump Sveltia ${{ steps.v.outputs.current }} → ${{ steps.v.outputs.target }} (contract green)"
          git push
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Report to control plane
        if: always()
        env:
          REPORT_URL: ${{ secrets.report_url }}
          SECRET: ${{ secrets.report_secret }}
        run: |
          [ -z "$SECRET" ] || [ -z "$REPORT_URL" ] && { echo "no report url/secret - skipping"; exit 0; }
          CONTRACT=$([ "${{ steps.verify.outcome }}" = success ] && echo pass || echo fail)
          # applied/already come from the commit step's EXPLICIT outputs, not its outcome:
          # a "nothing to commit" exits 0 (already=true, applied=false) and a rejected push
          # exits non-zero (both unset → false) — so a failed push reports applied=false,
          # already=false and the control plane can tell it apart from "already at target".
          APPLIED="${{ steps.commit.outputs.applied }}"; APPLIED="${APPLIED:-false}"
          ALREADY="${{ steps.commit.outputs.already }}"; ALREADY="${ALREADY:-false}"
          BODY=$(jq -nc --arg repo "$GITHUB_REPOSITORY" --arg mode "${{ steps.v.outputs.mode }}" \
            --arg current "${{ steps.v.outputs.current }}" --arg target "${{ steps.v.outputs.target }}" \
            --arg contract "$CONTRACT" --arg applied "$APPLIED" --arg already "$ALREADY" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{repo:$repo,kind:"sveltia",mode:$mode,current:$current,target:$target,contract:$contract,applied:($applied=="true"),already:($already=="true"),run_url:$run_url}')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')
          curl -sf -X POST -H "Content-Type: application/json" \
            -H "X-Stomme-Signature: $SIG" -d "$BODY" \
            "$REPORT_URL" || echo "report failed (non-blocking)"
